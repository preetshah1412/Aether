<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Neural Matrix & Habits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white font-['Outfit'] min-h-screen overflow-x-hidden">

    <!-- Premium Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-cyan-neon rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(6,182,212,0.5)]">
                    <i data-lucide="zap" class="text-black w-6 h-6"></i>
                </div>
                <span class="text-2xl font-black uppercase tracking-tighter">Aether</span>
            </div>
            
            <div class="hidden md:flex items-center gap-10">
                <a href="index.html" class="text-gray-500 hover:text-white transition-all text-xs font-black uppercase tracking-widest">Dashboard</a>
                <a href="habits.html" class="text-cyan-neon transition-all text-xs font-black uppercase tracking-widest relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-full after:h-0.5 after:bg-cyan-neon">Habits</a>
                <a href="bio.html" class="text-gray-500 hover:text-white transition-all text-xs font-black uppercase tracking-widest">Bio-Tracker</a>
                <a href="gym.html" class="text-gray-500 hover:text-white transition-all text-xs font-black uppercase tracking-widest">Gym Log</a>
            </div>

            <div class="flex items-center gap-4">
                <div class="glass px-5 py-2 rounded-full border-white/10 flex items-center gap-3">
                    <span class="system-status-badge"><span></span>System Online</span>
                    <span id="potential-score-nav" class="text-xs font-black uppercase tracking-widest text-white">20%</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-8 max-w-7xl mx-auto space-y-20">
        
        <!-- Header -->
        <div class="space-y-2 mb-16 animate-in">
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">
                Neural Matrix
            </h1>
            <p class="text-gray-500 font-bold uppercase tracking-[0.4em] text-xs pl-2">Sector 02: Consistency Protocol</p>
        </div>

        <!-- Matrix Grid -->
        <section class="space-y-8 animate-in" style="animation-delay: 0.1s">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-gray-500">Temporal Matrix</h3>
                <button onclick="window.app.showAddSectorModal()" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest text-cyan-neon transition-all">
                    Add Sector +
                </button>
            </div>
            
            <div class="reactive-card neural-matrix-shell glass-heavy rounded-[40px] p-10 border-white/10 overflow-x-auto no-scrollbar" id="habit-matrix">
                <!-- Matrix injected by JS -->
            </div>
        </section>

        <!-- Habit Arsenals -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Good Habits (Ascension) -->
            <section class="space-y-8 animate-in" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between px-2">
                    <h3 class="text-xs font-black uppercase tracking-[0.3em] text-cyan-neon">Ascension Protocols</h3>
                    <button onclick="window.app.showHabitModal('good')" class="w-8 h-8 rounded-full bg-cyan-neon/10 flex items-center justify-center text-cyan-neon hover:bg-cyan-neon hover:text-black transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="grid grid-cols-1 gap-4" id="good-habits-list">
                    <!-- Good habits injected by JS -->
                </div>
            </section>

            <!-- Bad Habits (Decay) -->
            <section class="space-y-8 animate-in" style="animation-delay: 0.3s">
                <div class="flex items-center justify-between px-2">
                    <h3 class="text-xs font-black uppercase tracking-[0.3em] text-red-500">Decay Mitigation</h3>
                    <button onclick="window.app.showHabitModal('bad')" class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="grid grid-cols-1 gap-4" id="bad-habits-list">
                    <!-- Bad habits injected by JS -->
                </div>
            </section>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-6">
        <div class="reactive-card glass-heavy w-full max-w-xl rounded-[40px] p-12 border-white/10 animate-in relative">
            <button onclick="document.getElementById('modal-overlay').classList.replace('flex','hidden')" class="absolute top-8 right-8 text-gray-500 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h2 id="modal-title" class="text-4xl font-black uppercase tracking-tighter mb-8">Neural Entry</h2>
            <div id="modal-content" class="mb-10"></div>
            <button id="modal-submit" class="w-full py-6 bg-cyan-neon text-black font-black uppercase tracking-widest rounded-2xl hover:scale-[0.98] transition-all">
                Sync Entry
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            if (window.app) window.app.renderAll();
        });
    </script>
</body>
</html>
